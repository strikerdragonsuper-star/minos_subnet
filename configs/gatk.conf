# GATK HaplotypeCaller Quality Parameters
# Adjust these values to optimize variant calling quality.
# Only quality-affecting params — threads, memory, timeout are auto-detected.

# --- Quality filtering ---

# Minimum base quality required to consider a base for calling (0-50)
min_base_quality_score=10

# Minimum mapping quality to keep, inclusive (0-60)
min_mapping_quality_score=20

# Base qualities below this threshold will be reduced to the minimum (0-50)
base_quality_score_threshold=18

# --- Calling confidence ---

# Minimum phred-scaled confidence threshold for calling variants (0-100)
standard_min_confidence_threshold_for_calling=30.0

# Mode for emitting reference confidence scores (NONE, GVCF, BP_RESOLUTION)
emit_ref_confidence=NONE

# --- PCR error model ---

# PCR indel model to use (NONE, HOSTILE, AGGRESSIVE, CONSERVATIVE)
# GIAB/Minos BAMs are PCR-free — CONSERVATIVE hurts recall on indels.
pcr_indel_model=NONE

# --- Assembly graph ---

# Minimum support to not prune paths in the assembly graph (1-10)
min_pruning=2

# Maximum number of alternate alleles to genotype (1-20)
max_alternate_alleles=6

# Minimum length of a dangling branch to attempt recovery (1-20)
min_dangling_branch_length=4

# Recover all dangling branches regardless of length (true/false)
recover_all_dangling_branches=false

# Maximum number of haplotypes considered from the assembly graph (8-512)
max_num_haplotypes_in_population=128

# Starting error rate for adaptive pruning model (0.0001-0.1)
adaptive_pruning_initial_error_rate=0.001

# Log-odds threshold for adaptive pruning; higher = more aggressive (0.5-10.0)
pruning_lod_threshold=2.302585

# --- Active region determination ---

# Minimum probability for a locus to be considered active (0.0001-0.05)
active_probability_threshold=0.002

# Minimum size of an assembly region in bases (1-300)
min_assembly_region_size=50

# Maximum size of an assembly region in bases (100-1000)
max_assembly_region_size=300

# Extra context bases added around each assembly region (0-500)
assembly_region_padding=100

# --- Pair-HMM / likelihood computation ---

# Flat gap continuation penalty for Pair-HMM; higher penalizes longer indels (1-30)
pair_hmm_gap_continuation_penalty=10

# Phred-scaled global read mismapping rate; higher = trust reads more (10-60)
phred_scaled_global_read_mismapping_rate=45

# --- Genotyping priors ---

# Prior probability of SNP heterozygosity (0.0001-0.01)
heterozygosity=0.001

# Prior probability of indel heterozygosity (0.00001-0.001)
indel_heterozygosity=0.000125

# Assumed ploidy of the sample (1-10)
sample_ploidy=2

# Fraction of contamination in sequencing data for biased downsampling (0.0-0.5)
contamination_fraction_to_filter=0.0

# --- Downsampling ---

# Max reads to retain per alignment start position, 0 to disable (0-1000)
max_reads_per_alignment_start=50

# --- Read filtering ---

# Do not analyze soft-clipped bases in reads (true/false)
dont_use_soft_clipped_bases=false
